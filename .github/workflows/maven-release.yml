name: Publish Release - main

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Configurar Java
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Crear settings.xml para Maven
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>github</username>
                <password>${{ secrets.GITHUB_TOKEN }}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Leer versión desde pom.xml
        id: read_version
        run: |
          VERSION=$(grep -m1 '<revision>' pom.xml | sed -E 's/.*<revision>(.*)<\/revision>.*/\1/')
          echo "RELEASE_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Publicar release
        run: |
          mvn deploy -B -Drevision=${{ env.RELEASE_VERSION }} -s ~/.m2/settings.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Crear tag si no existe
        run: |
          git fetch --tags
          if git rev-parse "v${{ env.RELEASE_VERSION }}" >/dev/null 2>&1; then
            echo "Tag v${{ env.RELEASE_VERSION }} ya existe."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions@github.com"
            git tag "v${{ env.RELEASE_VERSION }}"
            git push origin "v${{ env.RELEASE_VERSION }}"
          fi

      - name: Crear PR hacia develop con nueva SNAPSHOT
        run: |
          IFS='.' read -r MAJOR MINOR PATCH <<< "${{ env.RELEASE_VERSION }}"
          PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$PATCH-SNAPSHOT"

          git checkout -b sync-develop origin/develop
          sed -i "s|<revision>.*</revision>|<revision>$NEW_VERSION</revision>|" pom.xml

          git config user.name "github-actions[bot]"
          git config user.email "github-actions@github.com"
          git commit -am "chore: bump version to $NEW_VERSION [sync from release]"
          git push -f origin sync-develop

          gh pr create -B develop -H sync-develop \
            --title "chore: bump version to $NEW_VERSION" \
            --body "🔁 Sincronización de versión desde release."
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
