name: Release

on:
  push:
    branches: [ "main", "develop" ]

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Configurar Java 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Configurar remote con token
        run: git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git

      - name: Crear settings.xml para Maven
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0">
            <servers>
              <server>
                <id>github</id>
                <username>github</username>
                <password>${{ secrets.GITHUB_TOKEN }}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Calcular versiones
        id: versioning
        run: |
          git fetch --tags
          latestTag=$(git tag --sort=-v:refname | grep '^v' | head -n 1)

          if [ -z "$latestTag" ]; then
            baseVersion="0.0.0"
          else
            baseVersion="${latestTag#v}"
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$baseVersion"
          NEXT_RELEASE="$MAJOR.$MINOR.$((PATCH + 1))"
          NEXT_SNAPSHOT="$MAJOR.$MINOR.$((PATCH + 2))-SNAPSHOT"

          echo "RELEASE_VERSION=$NEXT_RELEASE" >> $GITHUB_ENV
          echo "SNAPSHOT_VERSION=$NEXT_SNAPSHOT" >> $GITHUB_ENV

      - name: Crear primer tag si no existe (solo en develop)
        if: github.ref == 'refs/heads/develop'
        run: |
          git fetch --tags
          tagCount=$(git tag | wc -l)
          if [ "$tagCount" -eq 0 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions@github.com"
            git tag "v${{ env.RELEASE_VERSION }}"
            git push origin "v${{ env.RELEASE_VERSION }}"
          fi

      - name: Publicar SNAPSHOT (develop)
        if: github.ref == 'refs/heads/develop'
        run: mvn deploy -B -Drevision=${{ env.RELEASE_VERSION }}-SNAPSHOT -s ~/.m2/settings.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publicar release (main)
        if: github.ref == 'refs/heads/main'
        run: mvn deploy -B -Drevision=${{ env.RELEASE_VERSION }} -s ~/.m2/settings.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Crear tag de release si no existe (main)
        if: github.ref == 'refs/heads/main'
        run: |
          git fetch --tags
          if git rev-parse "v${{ env.RELEASE_VERSION }}" >/dev/null 2>&1; then
            echo "Tag v${{ env.RELEASE_VERSION }} ya existe."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions@github.com"
            git tag "v${{ env.RELEASE_VERSION }}"
            git push origin "v${{ env.RELEASE_VERSION }}"
          fi

      - name: Crear tag para la siguiente versión SNAPSHOT (main)
        if: github.ref == 'refs/heads/main'
        run: |
          git fetch --tags
          SNAPSHOT_VERSION="${{ env.SNAPSHOT_VERSION }}"
          SNAPSHOT_BASE="${SNAPSHOT_VERSION%-SNAPSHOT}"

          if git rev-parse "v$SNAPSHOT_BASE" >/dev/null 2>&1; then
            echo "Tag v$SNAPSHOT_BASE ya existe."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions@github.com"
            git tag "v$SNAPSHOT_BASE"
            git push origin "v$SNAPSHOT_BASE"
          fi

      - name: Crear Pull Request a develop (main)
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git fetch origin develop
          git checkout origin/develop -b sync-develop || git checkout sync-develop

          sed -i 's/<revision>.*<\/revision>/<revision>${{ env.SNAPSHOT_VERSION }}<\/revision>/' pom.xml

          git config user.name "github-actions[bot]"
          git config user.email "github-actions@github.com"
          git commit -am "chore: Bump version to ${{ env.SNAPSHOT_VERSION }} [skip ci]" || echo "Sin cambios"
          git push -f origin sync-develop

          gh pr create -B develop -H sync-develop \
            --title "chore: Sync version ${{ env.SNAPSHOT_VERSION }} to develop" \
            --body "Actualización automática de versión a \`${{ env.SNAPSHOT_VERSION }}\` tras release."