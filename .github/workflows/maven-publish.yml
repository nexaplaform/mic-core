name: SNAPSHOT - Develop

on:
  push:
    branches: [ "develop" ]

permissions:
  contents: write
  packages: write

jobs:
  publish-snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Configurar Java 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Configurar remote con token
        run: git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git

      - name: Crear settings.xml para Maven
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0">
            <servers>
              <server>
                <id>github</id>
                <username>github</username>
                <password>${{ secrets.GITHUB_TOKEN }}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Calcular versión y crear primer tag si no existe
        id: versioning
        run: |
          git fetch --tags

          latestTag=$(git tag --sort=-v:refname | grep '^v' | head -n 1)

          if [ -z "$latestTag" ]; then
            echo "No hay tags, se creará v0.0.1"
            VERSION="0.0.1"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions@github.com"
            git tag "v$VERSION"
            git push origin "v$VERSION"
          else
            VERSION="${latestTag#v}"
            echo "Ya existe tag $latestTag"
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          SNAPSHOT_VERSION="$MAJOR.$MINOR.$PATCH-SNAPSHOT"
          echo "SNAPSHOT_VERSION=$SNAPSHOT_VERSION" >> $GITHUB_ENV

      - name: Verificar si ya existe una release publicada
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SNAPSHOT_VERSION="${{ env.SNAPSHOT_VERSION }}"
          RELEASE_VERSION="${SNAPSHOT_VERSION%-SNAPSHOT}"

          echo "Verificando si existe una release con la versión: $RELEASE_VERSION..."

          if gh release view "v$RELEASE_VERSION" --json tagName >/dev/null 2>&1; then
            echo "⚠️ Ya existe una release publicada con la versión $RELEASE_VERSION"
            echo "Esta versión SNAPSHOT ya no puede ser publicada." 
            echo "::error ::❌ Publicación cancelada: ya existe la release v$RELEASE_VERSION"
            exit 1
          else
            echo "✅ No hay release publicada para $RELEASE_VERSION, se procederá con el SNAPSHOT."
          fi

      - name: Publicar SNAPSHOT
        run: mvn deploy -B -Drevision=${{ env.SNAPSHOT_VERSION }} -s ~/.m2/settings.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
