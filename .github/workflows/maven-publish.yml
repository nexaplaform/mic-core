name: Release

on:
  push:
    branches: [ "main", "develop" ]

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Configurar Java 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Configurar remote con token
        run: git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git

      - name: Crear settings.xml para Maven
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0">
            <servers>
              <server>
                <id>github</id>
                <username>github</username>
                <password>${{ secrets.GITHUB_TOKEN }}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Calcular siguiente versión
        id: calc_version
        run: |
          git fetch --tags --force
          latestTag=$(git tag --sort=-v:refname | head -n 1)

          if [ -z "$latestTag" ]; then
            releaseVersion="0.0.1"
          else
            version=${latestTag#v}
            IFS='.' read -r MAJOR MINOR PATCH <<< "$version"
            PATCH_RELEASE=$((PATCH + 1))
            releaseVersion="$MAJOR.$MINOR.$PATCH_RELEASE"
          fi

          PATCH_SNAPSHOT=$(echo $releaseVersion | awk -F. '{print $1"."$2"."$3+1"-SNAPSHOT"}')
          echo "RELEASE_VERSION=$releaseVersion" >> $GITHUB_ENV
          echo "SNAPSHOT_VERSION=$PATCH_SNAPSHOT" >> $GITHUB_ENV

      # Solo en develop: Publicar SNAPSHOT
      - name: Publicar SNAPSHOT (develop)
        if: github.ref == 'refs/heads/develop'
        run: mvn deploy -B -Drevision=${{ env.SNAPSHOT_VERSION }} -s ~/.m2/settings.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Solo en main: Publicar release
      - name: Publicar release (main)
        if: github.ref == 'refs/heads/main'
        run: mvn deploy -B -Drevision=${{ env.RELEASE_VERSION }} -s ~/.m2/settings.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Solo en main: Crear tag si no existe
      - name: Crear tag de release (main)
        if: github.ref == 'refs/heads/main'
        run: |
          if git rev-parse "v${{ env.RELEASE_VERSION }}" >/dev/null 2>&1; then
            echo "Tag v${{ env.RELEASE_VERSION }} ya existe, no se creará de nuevo."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions@github.com"
            git tag "v${{ env.RELEASE_VERSION }}"
            git push origin "v${{ env.RELEASE_VERSION }}"
          fi

      # Solo en main: actualizar a la siguiente versión SNAPSHOT
      - name: Actualizar a SNAPSHOT ${{ env.SNAPSHOT_VERSION }} (main)
        if: github.ref == 'refs/heads/main'
        run: |
          sed -i 's/<revision>.*<\/revision>/<revision>${{ env.SNAPSHOT_VERSION }}<\/revision>/' pom.xml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@github.com"
          git commit -am "chore: Bump version to ${{ env.SNAPSHOT_VERSION }} [skip ci]"
          git push origin main

      # Solo en main: Pull request hacia develop
      - name: Crear Pull Request a develop (main)
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh pr create -B develop -H main \
            --title "chore: Sync version ${{ env.SNAPSHOT_VERSION }} to develop" \
            --body "Actualización automática de versión a \`${{ env.SNAPSHOT_VERSION }}\` tras release."
          
