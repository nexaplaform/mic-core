name: Preview SNAPSHOT version

on:
  pull_request:
    branches: [ "develop" ]
    types: [opened, edited, labeled, unlabeled, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  preview-version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Leer versión actual desde pom.xml
        id: read_version
        run: |
          VERSION=$(grep -m1 '<revision>' pom.xml | sed -E 's/.*<revision>(.*)<\/revision>.*/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "🔍 Versión actual en pom.xml: $VERSION"

      - name: Detectar si hay label que modifica versión
        id: detect_label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LABEL=$(gh pr view ${{ github.event.pull_request.number }} --json labels --jq '.labels[].name' | grep -E 'bugfix|fix|hotfix|feature' | head -n 1 || true)
          echo "LABEL=$LABEL" >> $GITHUB_ENV
          echo "🔖 Label detectada: $LABEL"

      - name: Calcular nueva versión si aplica
        if: env.LABEL != ''
        id: calc_version
        run: |
          BASE="${{ env.VERSION }}"
          BASE_CLEAN="${BASE%-SNAPSHOT}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_CLEAN"

          case "${{ env.LABEL }}" in
            bugfix|fix|hotfix)
              PATCH=$((PATCH + 1))
              ;;
            feature)
              MINOR=$((MINOR + 1))
              ;;
          esac

          NEXT_VERSION="$MAJOR.$MINOR.$PATCH-SNAPSHOT"
          echo "NEXT_VERSION=$NEXT_VERSION" >> $GITHUB_ENV
          echo "📦 Versión que se aplicará al hacer merge: $NEXT_VERSION"

      - name: Comentar en la PR con la próxima versión
        if: env.LABEL != '' && env.NEXT_VERSION != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "📦 **Versión que se aplicará si se mergea:** \`${{ env.NEXT_VERSION }}\`"