name: Release
on:
  push:
    branches: [ main ]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Configurar Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          # ... (otras configuraciones como cache de dependencias, etc)

      - name: Calcular siguiente versión
        id: calc_version
        run: |  # (Script de cálculo mostrado antes)
          # ...obtiene LATEST_TAG, calcula $RELEASE_VERSION y $SNAPSHOT_VERSION
          echo "RELEASE_VERSION=$releaseVersion" >> $GITHUB_ENV
          echo "SNAPSHOT_VERSION=$nextSnapshot" >> $GITHUB_ENV

      - name: Publicar release ${RELEASE_VERSION}
        env:
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
        run: |
          git tag "v${RELEASE_VERSION}" 
          git push origin "v${RELEASE_VERSION}"
          mvn deploy -B -Drevision=${RELEASE_VERSION}

      - name: Actualizar a ${SNAPSHOT_VERSION}
        env:
          SNAPSHOT_VERSION: ${{ env.SNAPSHOT_VERSION }}
        run: |
          sed -i 's/<revision>.*<\/revision>/<revision>'${SNAPSHOT_VERSION}'<\/revision>/' pom.xml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "chore: Bump version to ${SNAPSHOT_VERSION} [skip ci]"
          git push origin main

      - name: Crear Pull Request a develop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create -B develop -H main \
            --title "chore: Sync version ${SNAPSHOT_VERSION} to develop" \
            --body "Actualización automática de versión a \`${SNAPSHOT_VERSION}\` tras release."
      

