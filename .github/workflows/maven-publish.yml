name: Preview SNAPSHOT version

on:
  pull_request:
    branches: [ "develop" ]
    types: [opened, edited, labeled, unlabeled, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  preview-version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Leer versión actual desde pom.xml
        id: read_version
        run: |
          VERSION=$(grep -m1 '<revision>' pom.xml | sed -E 's/.*<revision>(.*)<\/revision>.*/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Calcular próxima versión basada en label
        id: calc_next
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BASE="${{ env.VERSION }}"
          BASE_CLEAN="${BASE%-SNAPSHOT}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_CLEAN"

          echo "Versión actual del pom.xml: $BASE"

          LABEL=$(gh pr view ${{ github.event.pull_request.number }} --json labels --jq '.labels[].name' | grep -E 'bugfix|fix|hotfix|feature' | head -n 1 || true)

          if [[ "$LABEL" =~ ^(bugfix|fix|hotfix)$ ]]; then
            PATCH=$((PATCH + 1))
          elif [[ "$LABEL" == "feature" ]]; then
            MINOR=$((MINOR + 1))
          else
            echo "🔁 Ninguna label especial detectada, no se modificará el pom.xml"
            exit 0
          fi

          NEXT_VERSION="$MAJOR.$MINOR.$PATCH-SNAPSHOT"
          echo "📦 Próxima versión si se mergea: $NEXT_VERSION"
          echo "NEXT_VERSION=$NEXT_VERSION" >> $GITHUB_ENV

      - name: Actualizar pom.xml con la nueva versión
        if: env.NEXT_VERSION
        run: |
          sed -i 's|<revision>.*</revision>|<revision>${{ env.NEXT_VERSION }}</revision>|' pom.xml

      - name: Hacer commit de la nueva versión
        if: env.NEXT_VERSION
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@github.com"
          git commit -am "chore: bump version to ${{ env.NEXT_VERSION }} [auto]" || echo "Sin cambios"
          git push origin HEAD

      - name: Comentar en la PR con la próxima versión
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "📦 Próxima versión a publicar : \`${{ env.NEXT_VERSION }}\`\n📝 Ya actualizada en el \`pom.xml\`"