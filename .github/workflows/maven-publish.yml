name: Release

on:
  push:
    branches: [ "main", "develop" ]

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Configurar Java 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Configurar remote con token
        run: git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git

      - name: Crear settings.xml para Maven
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0">
            <servers>
              <server>
                <id>github</id>
                <username>github</username>
                <password>${{ secrets.GITHUB_TOKEN }}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Calcular versión y crear tag si no existe
        id: versioning
        run: |
          git fetch --tags
          latestTag=$(git tag --sort=-v:refname | grep '^v' | head -n 1)

          if [ -z "$latestTag" ]; then
            baseVersion="0.0.0"
          else
            baseVersion="${latestTag#v}"
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$baseVersion"
          NEXT_PATCH=$((PATCH + 1))
          RELEASE_VERSION="$MAJOR.$MINOR.$NEXT_PATCH"
          SNAPSHOT_VERSION="$RELEASE_VERSION-SNAPSHOT"

          echo "RELEASE_VERSION=$RELEASE_VERSION" >> $GITHUB_ENV
          echo "SNAPSHOT_VERSION=$SNAPSHOT_VERSION" >> $GITHUB_ENV

          # Crear el tag solo en develop
          if [[ "${GITHUB_REF##*/}" == "develop" ]]; then
            if git rev-parse "v$RELEASE_VERSION" >/dev/null 2>&1; then
              echo "Tag v$RELEASE_VERSION ya existe."
            else
              git config user.name "github-actions[bot]"
              git config user.email "github-actions@github.com"
              git tag "v$RELEASE_VERSION"
              git push origin "v$RELEASE_VERSION"
            fi
          fi

      # Publicar SNAPSHOT en develop
      - name: Publicar SNAPSHOT (develop)
        if: github.ref == 'refs/heads/develop'
        run: mvn deploy -B -Drevision=${{ env.SNAPSHOT_VERSION }} -s ~/.m2/settings.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Publicar release en main
      - name: Publicar release (main)
        if: github.ref == 'refs/heads/main'
        run: mvn deploy -B -Drevision=${{ env.RELEASE_VERSION }} -s ~/.m2/settings.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Bump versión a siguiente SNAPSHOT en main
      - name: Actualizar a siguiente SNAPSHOT (main)
        if: github.ref == 'refs/heads/main'
        run: |
          IFS='.' read -r MAJOR MINOR PATCH <<< "${{ env.RELEASE_VERSION }}"
          NEXT_PATCH=$((PATCH + 1))
          NEXT_VERSION="$MAJOR.$MINOR.$NEXT_PATCH-SNAPSHOT"

          sed -i 's/<revision>.*<\/revision>/<revision>'$NEXT_VERSION'<\/revision>/' pom.xml

          git config user.name "github-actions[bot]"
          git config user.email "github-actions@github.com"
          git commit -am "chore: Bump version to $NEXT_VERSION [skip ci]"
          git push origin main

      # Crear PR de sincronización a develop
      - name: Crear Pull Request a develop (main)
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh pr create -B develop -H main \
            --title "chore: Sync version ${{ env.SNAPSHOT_VERSION }} to develop" \
            --body "Actualización automática de versión a \`${{ env.SNAPSHOT_VERSION }}\` tras release."